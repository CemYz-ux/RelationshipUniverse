<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0d0d12"/>

  <!-- Spokes: center → satellites -->
  <line x1="16" y1="16" x2="16" y2="5"  stroke="#c9b8ff" stroke-width="1.5" stroke-opacity="0.85"/>
  <line x1="16" y1="16" x2="27" y2="13" stroke="#ff9eb5" stroke-width="1.5" stroke-opacity="0.85"/>
  <line x1="16" y1="16" x2="23" y2="25" stroke="#7dd4b8" stroke-width="1.5" stroke-opacity="0.85"/>
  <line x1="16" y1="16" x2="9"  y2="25" stroke="#ff5c8a" stroke-width="1.5" stroke-opacity="0.85"/>
  <line x1="16" y1="16" x2="5"  y2="13" stroke="#f4a868" stroke-width="1.5" stroke-opacity="0.85"/>

  <!-- Cross-connections -->
  <line x1="16" y1="5"  x2="27" y2="13" stroke="white" stroke-width="1" stroke-opacity="0.18"/>
  <line x1="9"  y1="25" x2="23" y2="25" stroke="white" stroke-width="1" stroke-opacity="0.18"/>

  <!-- Satellite nodes -->
  <circle cx="16" cy="5"  r="3.5" fill="#c9b8ff"/>
  <circle cx="27" cy="13" r="3.5" fill="#ff9eb5"/>
  <circle cx="23" cy="25" r="3.5" fill="#7dd4b8"/>
  <circle cx="9"  cy="25" r="3.5" fill="#ff5c8a"/>
  <circle cx="5"  cy="13" r="3.5" fill="#f4a868"/>

  <!-- Center node -->
  <circle cx="16" cy="16" r="5" fill="white" fill-opacity="0.1" stroke="white" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="2" fill="white" fill-opacity="0.55"/>
</svg>
