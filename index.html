  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/graph.css">
  <link rel="stylesheet" href="css/bubble.css">
  <link rel="stylesheet" href="css/panels.css">
  <link rel="stylesheet" href="css/controls.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>

<header>
  <h1>Polymaps</h1>
  <p>Click node to inspect · Drag to rearrange · Scroll to zoom</p>
  <a id="github-link" href="https://github.com/CemYz-ux/RelationshipUniverse" target="_blank" rel="noopener" title="View source on GitHub">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>

</header>

<!-- QR code modal (shows MY QR only) -->
<div id="qr-modal" onclick="hideQRCode()">
  <div id="qr-card" onclick="event.stopPropagation()">
    <p class="qr-label">Share your network</p>
    <div id="qr-code"></div>
    <button class="qr-close" onclick="hideQRCode()">✕ Close</button>
  </div>
</div>

<!-- Import modal (URL input + QR scanner) -->
<div id="import-modal" onclick="hideImportModal()">
  <div id="import-card" onclick="event.stopPropagation()">
    <p class="qr-label">Import Network</p>

    <div class="import-url-row">
      <input class="import-url-input" id="import-url-input" type="text" placeholder="Paste share URL…" onkeydown="if(event.key==='Enter') importFromURLInput()" />
      <button class="import-url-btn" onclick="importFromURLInput()">↑ Import</button>
    </div>

    <div class="import-or"><span>or scan QR code</span></div>

    <div id="import-scanner-wrap">
      <video id="import-video" playsinline muted></video>
      <div class="qr-scan-overlay"><div class="qr-scan-corner"></div></div>
    </div>
    <p id="import-scan-status">Starting camera…</p>

    <button class="qr-close" onclick="hideImportModal()">✕ Close</button>
  </div>
</div>

<div id="graph-container">
  <div class="blob" style="width:420px;height:420px;background:#c9b8ff;top:-120px;right:80px;"></div>
  <div class="blob" style="width:320px;height:320px;background:#ff9eb5;bottom:-80px;left:60px;"></div>

  <svg id="svg"></svg>

  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#c9b8ff;"></div>Partner</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff9eb5;"></div>Friend</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7dd4b8;"></div>Dating</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff5c8a;"></div>Crush</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f4a868;"></div>Fling</div>
    <div class="legend-item"><div class="legend-dot" style="background:#9999bb;"></div>Ex</div>
    <div class="legend-item"><div class="legend-dot" style="background:#aaaaaa;"></div>Other</div>
  </div>

  <!-- Import / Export bar -->
  <div id="io-bar">
    <button class="btn-io" onclick="shareAsURL()">⤴ Share</button>
    <button class="btn-io" onclick="showQRCode()">⊡ QR</button>
    <button class="btn-io btn-io-danger" onclick="clearAll()">✕ Clear</button>
    <div id="io-overflow">
      <button class="btn-io" id="io-overflow-btn" onclick="toggleOverflowMenu(event)">⋯</button>
      <div id="io-overflow-menu">
        <button class="overflow-item" onclick="exportJSON(); closeOverflowMenu()">↓ Backup JSON</button>
        <button class="overflow-item" onclick="document.getElementById('import-input').click(); closeOverflowMenu()">↑ Restore JSON</button>
      </div>
    </div>
    <input id="import-input" type="file" accept=".json" style="display:none" />
    <input id="import-network-input" type="file" accept=".json" style="display:none" />
  </div>
  <span id="import-feedback">✓ Imported!</span>

  <!-- Side panel: view + edit modes -->
  <div id="side-panel">
    <div id="sp-view"></div>
    <div id="sp-edit">
      <div class="edit-title" id="edit-title">Editing…</div>
      <div class="edit-field">
        <label class="edit-label">Name</label>
        <input class="edit-input" id="edit-name" type="text" maxlength="24" />
      </div>
      <div class="edit-field">
        <label class="edit-label">Type</label>
        <div id="edit-type-dropdown" class="type-dropdown">
          <button type="button" class="type-dropdown-btn" onclick="toggleEditTypeDropdown(event)">
            <span id="edit-type-dot" class="td-dot" style="background:#c9b8ff"></span>
            <span id="edit-type-label">Partner</span>
            <span class="td-chevron">▾</span>
          </button>
          <div id="edit-type-menu" class="type-dropdown-menu">
            <div class="td-option" data-value="partner" onclick="selectEditType('partner')"><span class="td-dot" style="background:#c9b8ff"></span>Partner</div>
            <div class="td-option" data-value="friend"  onclick="selectEditType('friend')" ><span class="td-dot" style="background:#ff9eb5"></span>Friend</div>
            <div class="td-option" data-value="dating"  onclick="selectEditType('dating')" ><span class="td-dot" style="background:#7dd4b8"></span>Dating</div>
            <div class="td-option" data-value="crush"   onclick="selectEditType('crush')"  ><span class="td-dot" style="background:#ff5c8a"></span>Crush</div>
            <div class="td-option" data-value="fling"   onclick="selectEditType('fling')"  ><span class="td-dot" style="background:#f4a868"></span>Fling</div>
            <div class="td-option" data-value="ex"      onclick="selectEditType('ex')"     ><span class="td-dot" style="background:#9999bb"></span>Ex</div>
            <div class="td-option" data-value="other"   onclick="selectEditType('other')"  ><span class="td-dot" style="background:#aaaaaa"></span>Other</div>
          </div>
        </div>
        <input type="hidden" id="edit-type" value="partner">
      </div>
      <div class="edit-field">
        <label class="edit-label">Location</label>
        <input class="edit-input" id="edit-location" type="text" maxlength="28" />
      </div>
      <div class="edit-field">
        <label class="edit-label">Note</label>
        <textarea class="edit-input" id="edit-note" maxlength="200" rows="3"></textarea>
      </div>
      <div class="edit-actions">
        <button class="btn-cancel-edit" onclick="cancelEdit()">Cancel</button>
        <button class="btn-save" onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>

  <!-- Node action bubble -->
  <div id="node-bubble">
    <button class="nb-btn" id="nb-link" title="Link to existing node">⇌</button>
    <button class="nb-btn" id="nb-info" title="View details">✎</button>
  </div>

  <!-- Add person panel -->
  <div id="panel">
    <span id="connect-to-label">→ You:</span>
    <input id="name-input" type="text" placeholder="Name…" maxlength="22" />
    <div class="panel-divider"></div>
    <div id="type-dropdown" class="type-dropdown">
      <button type="button" class="type-dropdown-btn" onclick="toggleTypeDropdown(event)">
        <span id="type-dot" class="td-dot" style="background:#c9b8ff"></span>
        <span id="type-label">Partner</span>
        <span class="td-chevron">▾</span>
      </button>
      <div id="type-menu" class="type-dropdown-menu">
        <div class="td-option selected" data-value="partner" onclick="selectType('partner')"><span class="td-dot" style="background:#c9b8ff"></span>Partner</div>
        <div class="td-option" data-value="friend"  onclick="selectType('friend')" ><span class="td-dot" style="background:#ff9eb5"></span>Friend</div>
        <div class="td-option" data-value="dating"  onclick="selectType('dating')" ><span class="td-dot" style="background:#7dd4b8"></span>Dating</div>
        <div class="td-option" data-value="crush"   onclick="selectType('crush')"  ><span class="td-dot" style="background:#ff5c8a"></span>Crush</div>
        <div class="td-option" data-value="fling"   onclick="selectType('fling')"  ><span class="td-dot" style="background:#f4a868"></span>Fling</div>
        <div class="td-option" data-value="ex"      onclick="selectType('ex')"     ><span class="td-dot" style="background:#9999bb"></span>Ex</div>
        <div class="td-option" data-value="other"   onclick="selectType('other')"  ><span class="td-dot" style="background:#aaaaaa"></span>Other</div>
      </div>
    </div>
    <input type="hidden" id="type-select" value="partner">
    <div class="panel-divider"></div>
    <input id="location-input" type="text" placeholder="Location…" maxlength="20" />
    <div class="panel-divider"></div>
    <button class="btn-add" id="btn-add-main" onclick="addPerson()">+ Add</button>
  </div>

</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
